<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipit AI Clone Gratis</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:15px;
}

h1{
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
}

input,textarea,button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
}

textarea{
height:100px;
resize:none;
}

button{
background:#3b82f6;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#2563eb;
}

video{
width:100%;
margin-top:20px;
border-radius:15px;
background:black;
}

#lyrics{
margin-top:15px;
font-size:22px;
text-align:center;
font-weight:bold;
}

.download{
background:#22c55e;
margin-top:10px;
}
</style>
</head>
<body>

<div class="container">

<h1>Pipit AI Clone</h1>

<label>Upload Foto</label>
<input type="file" id="photo" accept="image/*">

<label>Upload MP3</label>
<input type="file" id="audio" accept="audio/*">

<label>Prompt Video</label>
<textarea id="prompt"
placeholder="Contoh:
Buat wajah tersenyum dan bergerak mengikuti lagu"></textarea>

<label>Lyrics</label>
<textarea id="lyricsInput"
placeholder="Masukkan lirik lagu"></textarea>

<button onclick="generateVideo()">
Generate Video
</button>

<video id="video" controls></video>

<div id="lyrics"></div>

<button class="download"
onclick="downloadVideo()">
Download Video
</button>

</div>

<script>

let videoBlob=null;

function generateVideo(){

const photo=document.getElementById('photo').files[0];
const audio=document.getElementById('audio').files[0];

if(!photo || !audio){
alert("Upload foto dan audio dulu");
return;
}

const img=new Image();

img.src=URL.createObjectURL(photo);

img.onload=()=>{

const canvas=document.createElement('canvas');
canvas.width=720;
canvas.height=1280;

const ctx=canvas.getContext('2d');

const stream=canvas.captureStream(30);

const recorder=new MediaRecorder(stream,{
mimeType:'video/webm'
});

const chunks=[];

recorder.ondataavailable=e=>{
chunks.push(e.data);
};

recorder.onstop=()=>{

videoBlob=new Blob(chunks,{
type:'video/webm'
});

const url=URL.createObjectURL(videoBlob);

document.getElementById('video').src=url;

};

recorder.start();

let frame=0;

const duration=30;
const fps=30;

const interval=setInterval(()=>{

ctx.clearRect(0,0,720,1280);

const zoom=1+0.0005*frame;

const w=720*zoom;
const h=1280*zoom;

ctx.drawImage(
img,
(720-w)/2,
(1280-h)/2,
w,
h
);

frame++;

if(frame>=duration*fps){

clearInterval(interval);

recorder.stop();

}

},1000/fps);

playAudio(audio);

showLyrics();

};

}

function playAudio(audioFile){

const audio=new Audio(
URL.createObjectURL(audioFile)
);

audio.play();

}

function showLyrics(){

const text=
document.getElementById('lyricsInput').value;

const box=document.getElementById('lyrics');

let words=text.split(" ");

let i=0;

box.innerHTML="";

const interval=setInterval(()=>{

if(i>=words.length){
clearInterval(interval);
return;
}

box.innerHTML+=words[i]+" ";

i++;

},500);

}

function downloadVideo(){

if(!videoBlob){
alert("Belum ada video");
return;
}

const a=document.createElement('a');

a.href=URL.createObjectURL(videoBlob);

a.download="pipit-ai-video.webm";

a.click();

}

</script>

</body>
</html>
